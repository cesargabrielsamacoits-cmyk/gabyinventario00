<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | RX-78 Inventory</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0d1b2a,#1b263b,#415a77);
            font-family:'Roboto', sans-serif;
            color:white;
            padding:30px;
        }

        .login-container{
            width:100%;
            max-width:450px;
        }

        /* CARD */

        .login-card{
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(14px);
            border-radius:24px;
            padding:45px;
            border:1px solid rgba(255,255,255,0.12);
            box-shadow:0 0 30px rgba(0,0,0,0.35);
        }

        /* LOGO */

        .logo{
            text-align:center;
            margin-bottom:35px;
            font-family:'Orbitron', sans-serif;
            font-size:2rem;
            font-weight:700;
            letter-spacing:2px;
        }

        .logo span{
            color:#e63946;
        }

        .title{
            text-align:center;
            font-size:2rem;
            margin-bottom:10px;
            color:#f1c40f;
            font-family:'Orbitron', sans-serif;
        }

        .subtitle{
            text-align:center;
            color:#dfe6e9;
            margin-bottom:35px;
            line-height:1.6;
        }

        /* FORM */

        .form-group{
            margin-bottom:25px;
        }

        .form-group label{
            display:block;
            margin-bottom:10px;
            font-weight:500;
            color:#f1c40f;
        }

        .form-group input{
            width:100%;
            padding:15px;
            border:none;
            border-radius:14px;
            background:rgba(255,255,255,0.12);
            color:white;
            font-size:1rem;
            outline:none;
            transition:0.3s ease;
        }

        .form-group input:focus{
            border:1px solid #f1c40f;
            box-shadow:0 0 12px rgba(241,196,15,0.35);
        }

        .form-group input::placeholder{
            color:#cfd8dc;
        }

        /* BUTTON */

        .btn-login{
            width:100%;
            padding:16px;
            border:none;
            border-radius:14px;
            background:#e63946;
            color:white;
            font-size:1rem;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s ease;
            margin-top:10px;
            box-shadow:0 0 18px rgba(230,57,70,0.35);
        }

        .btn-login:hover{
            transform:translateY(-3px);
            box-shadow:0 0 24px rgba(230,57,70,0.7);
        }

        /* LINKS */

        .extra-links{
            margin-top:25px;
            text-align:center;
        }

        .extra-links a{
            color:#f1c40f;
            text-decoration:none;
            transition:0.3s ease;
        }

        .extra-links a:hover{
            color:white;
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .login-card{
                padding:35px 25px;
            }

            .title{
                font-size:1.7rem;
            }

        }

    </style>

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <div class="logo">
                RX-78 <span>MODEL KIT</span>
            </div>

            <h1 class="title">
                Iniciar Sesión
            </h1>

            <p class="subtitle">
                Accede al sistema de inventario de Gunplas y Action Bases.
            </p>

            <form method="POST">

                {% csrf_token %}

                <div class="form-group">

                    <label for="username">
                        Usuario
                    </label>

                    <input 
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Ingresa tu usuario"
                        required
                    >

                </div>

                <div class="form-group">

                    <label for="password">
                        Contraseña
                    </label>

                    <input 
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Ingresa tu contraseña"
                        required
                    >

                </div>

                <button type="submit" class="btn-login">
                    🚀 Ingresar
                </button>

            </form>

            <div class="extra-links">

                <a href="/">
                    ← Volver al inicio
                </a>

            </div>

        </div>

    </div>

</body>
</html>
